<!DOCTYPE html>
<html lang="en" color-theme="n">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terux</title>
    <link rel="stylesheet" href="./src/style/fonts.css">
    <link rel="stylesheet" href="./src/style/colors.css">
    <link rel="stylesheet" href="./src/style/style.main.css">
    <link rel="stylesheet" href="./src/style/settings.css">
    <link rel="stylesheet" href="./src/style/style.scroll.css">
</head>

<body>
    <div class="terminal">
        <!-- TERMINAL HEAD -->
        <div class="navbar">
            <div class="navbar-touch" data-tauri-drag-region>

            </div>
            <div class="navbar-left">
                <div class="navbar-left-logo">
                    <img src="/icons/terux_mini.png" alt="Terux Icon">
                </div>
                <div class="navbar-left-title">Terux</div>
            </div>
            <div class="navbar-center">
                <div class="navbar-center-progress">$> Progressing - Smart Terminal</div>
            </div>
            <div class="navbar-right">
                <div class="navbar-right-hide navbar-button">
                    <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                        <line x1="4" y1="12" x2="20" y2="12"></line>
                    </svg>
                </div>
                <div class="navbar-right-screen navbar-button">
                    <svg width="14" height="14" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="16" height="16" x="4" y="4" rx="1.5"></rect>
                    </svg>
                </div>
                <div class="navbar-right-exit navbar-button">
                    <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </div>
            </div>
        </div>
        <!-- TERMINAL BODY -->
        <div class="body menu">
            <div class="body-head">
                <div class="body-left">
                    <div style="display: flex;flex-direction: row;min-width: 0;">
                        <div class="body-tabs">

                        </div>
                        <div class="body-plus" id="addTab">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 5V19M5 12H19" stroke="currentColor" style="color: var(--text);"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="body-navs">
                    <div class="body-navs-ai body-nav" id="smartButton">
                        <svg xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="var(--accent)">
                            <path d="M13 10h7l-9 13v-9H4l9-13z" />
                        </svg>
                    </div>
                    <div class="body-navs-settings body-nav" id="settingsButton">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                            fill="var(--accent)">
                            <path
                                d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.39-.29-.61-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.26-.25-.45-.5-.45h-3.76c-.25 0-.46.19-.5.45l-.36 2.54c-.59.24-1.12.57-1.62.94l-2.39-.96c-.22-.08-.49 0-.61.22L2.73 8.87c-.11.2-.06.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.39.29.61.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.26.25.45.5.45h3.76c.25 0 .46-.19.5-.45l.36-2.54c.59-.24 1.12-.57 1.62-.94l2.39.96c.22.08.49 0 .61-.22l1.92-3.32c.11-.2.06-.47-.12-.61l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z" />
                        </svg>
                    </div>
                </div>
            </div>
            <div class="body-main">
                <div class="body-main-terminal">
                    <div id="terminal"></div>
                </div>
            </div>
        </div>
        <!-- TERMINAL FOOTER -->
        <div class="footer menu">
            <div class="footer-navs">

            </div>
        </div>
        <div class="ai-div">
            <div class="ai-center-div">
                <div class="ai-input-div">
                    <input type="text" class="ai-input" id="aiDataInput" placeholder="I need a help for command!">
                    <button class="ai-button" id="aiDataButton">Submit</button>
                </div>
            </div>
        </div>
        <!-- TERMINAL SETTINGS -->
        <div class="settings menu" active>
            <div class="settings-body">
                <div class="settings-c">
                    <div class="settings-a">
                        <div class="settings-button" id="settingsUser">User Settings</div>
                        <div class="settings-button" id="settingsAI">AI Settings</div>
                    </div>
                    <div class="settings-b">
                        <div class="settings-exit">
                            <div class="settings-right-exit" id="exitSettings">
                                <svg width="16" height="16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M18 6 6 18"></path>
                                    <path d="m6 6 12 12"></path>
                                </svg>
                            </div>
                        </div>

                        <div class="settings-content-users settings-content">
                            <div class="settings-content-div">
                                <div class="settings-content-div-key-value">
                                    <div class="settings-content-key"><label for="editAlias"
                                            class="settings-content-label">Your Alias</label></div>
                                    <div class="settings-content-value"><input type="text"
                                            class="settings-content-input settings-change" id="userAliasInput"></div>
                                </div>
                                <div class="settings-content-div-key-value">
                                    <div class="settings-content-key"><label for="editAlias"
                                            class="settings-content-label">Your theme</label></div>
                                    <div class="settings-content-value">
                                        <div style="display:flex;flex-direction:row;gap: 0.5em;">
                                            <button id="tn"
                                                class="settings-theme-button settings-button-choice settings-change">Tokyo
                                                Night</button>
                                            <button id="n"
                                                class="settings-theme-button settings-button-choice">Nord</button>
                                            <button id="g"
                                                class="settings-theme-button settings-button-choice">Gruvbox</button>
                                            <button id="sl"
                                                class="settings-theme-button settings-button-choice">Solarized
                                                Light</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="settings-content-div-key-value">
                                    <div class="settings-content-key"><label for="editAlias"
                                            class="settings-content-label">Your font</label></div>
                                    <div class="settings-content-value">
                                        <div style="display:flex;flex-direction:row;gap: 0.5em;">
                                            <button id="jbm" class="settings-font-button settings-button-choice"
                                                style="font-family: 'JetBrains Mono';">JetBrains
                                                Mono</button>
                                            <button id="fc" class="settings-font-button settings-button-choice"
                                                style="font-family: 'Fira Code';">Fira Code</button>
                                            <button id="cc" class="settings-font-button settings-button-choice"
                                                style="font-family: 'Cascadia Code';">Cascadia Code</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="settings-content-div-key-value">
                                    <div class="settings-content-key"><label for="editAlias"
                                            class="settings-content-label">telemetry</label></div>
                                    <div class="settings-content-value">
                                        <span>Disabled</span>
                                        <label class="terux-toggle">
                                            <input type="checkbox" id="telemetryCheckbox" class="settings-change">
                                            <span class="slider"></span>
                                        </label>
                                        <span>Enabled</span>
                                    </div>
                                </div>
                                <span style="margin: 10px 0;font-size: 12px;user-select: none;">
                                    After saving critical settings such as alias, telemetry, API, model, and service,
                                    restart the application.
                                </span>
                            </div>
                        </div>
                        <div class="settings-content-ai settings-content" active> <!--BURADA KALDIN-->
                            <div class="settings-content-div">
                                <div class="settings-content-div-key-value">
                                    <div class="settings-content-key"><label for="editAPI"
                                            class="settings-content-label">Your API</label></div>
                                    <div class="settings-content-value">
                                        <input type="password" class="settings-content-input settings-change"
                                            id="aiApiInput" name="editAPI">
                                        <button id="toggleHideAPI">?</button>
                                    </div>
                                </div>
                                <div class="settings-content-div-key-value">
                                    <div class="settings-content-key"><label for="editModel"
                                            class="settings-content-label">Your Model</label></div>
                                    <div class="settings-content-value"><input type="text"
                                            class="settings-content-input settings-change" id="aiModelInput"
                                            name="editModel"></div>
                                </div>
                                <div class="settings-content-div-key-value">
                                    <div class="settings-content-key"><label for="editService"
                                            class="settings-content-label">Your Service</label></div>
                                    <div class="settings-content-value"><input type="text"
                                            class="settings-content-input settings-change" id="aiServiceInput"
                                            name="editService"></div>
                                </div>
                                <span style="margin: 10px 0;font-size: 12px;user-select: none;">
                                    After saving critical settings such as alias, telemetry, API, model, and service,
                                    restart the application.
                                </span>
                            </div>
                        </div>

                        <div class="settings-save-div" id="settingsSaveDiv">
                            <button class="settings-save-button" id="settingsSubmit">Save the Changes</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./src/script/script.main.ts" type="module"></script>
</body>

</html>
